<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="heading-container">
        <h1 class="heading">Rock Paper Scissor</h1>
    </header>

    <main class="main-container">
        <div class="choose-container">
            <button class="rock chooseBtn">ROCK</button>
            <button class="paper chooseBtn">PAPER</button>
            <button class="scissor chooseBtn">SCISSOR</button>
        </div>

        <div class="score-container">
            <div class="user-score"></div>
            <div class="computer-score"></div>
        </div>

        <div class="result">Pick Your Move</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
